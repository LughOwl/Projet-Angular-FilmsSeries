<ion-content [fullscreen]="true">
  <div class="container-center">
    <ion-button id="open-modal" expand="block" fill="clear" color="light">
      <ion-icon name="settings-outline" slot="start"></ion-icon>
      Ouvrir les Paramètres
    </ion-button>
  </div>

  <ion-modal
    trigger="open-modal"
    [initialBreakpoint]="0.5"
    [breakpoints]="[0, 0.5, 0.8]"
    [backdropBreakpoint]="0.5"
    class="sheet-modal">

    <ng-template>
      <ion-content class="ion-padding modal-bg">
        <div class="handle"></div>
        <div class="header-modal">
          <h2>Paramètres</h2>
        </div>

        <ion-list lines="none">
          <ion-item [button]="true" class="menu-item">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-label>Compte</ion-label>
          </ion-item>
          <ion-item [button]="true" class="menu-item">
            <ion-icon name="notifications-outline" slot="start"></ion-icon>
            <ion-label>Notifications</ion-label>
          </ion-item>
          <ion-item [button]="true" color="danger" class="menu-item logout">
            <ion-icon name="log-out-outline" slot="start"></ion-icon>
            <ion-label>Déconnexion</ion-label>
          </ion-item>
        </ion-list>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
