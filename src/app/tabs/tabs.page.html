<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="accueil" href="/tabs/accueil">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Accueil</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="films" href="/tabs/films">
      <ion-icon name="film-outline"></ion-icon>
      <ion-label>Films</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="naviguer" href="/tabs/naviguer">
      <ion-icon name="search-outline"></ion-icon>
      <ion-label>Naviguer</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="series" href="/tabs/series">
      <ion-icon name="videocam-outline"></ion-icon>
      <ion-label>Séries</ion-label>
    </ion-tab-button>

    <ion-tab-button id="open-settings-modal">
      <ion-icon name="settings-outline"></ion-icon>
      <ion-label>Paramètres</ion-label>
    </ion-tab-button>
  </ion-tab-bar>

  <ion-modal
    trigger="open-settings-modal"
    [initialBreakpoint]="0.4"
    [breakpoints]="[0, 0.4]"
    class="custom-modal">
    <ng-template>
      <ion-content class="modal-settings-content">
        <div class="ion-padding">
          <div class="close-header">
            <ion-button fill="clear" color="light" (click)="fermerParametres()">
              <ion-icon name="close-outline" slot="icon-only"></ion-icon>
            </ion-button>
          </div>

          <div class="setting-row">
            <p>Mode :</p>
            <div class="toggle-pill">
              <div [class]="modeSombre ? 'pill-active' : 'pill-inactive'" (click)="setMode(true)">
                <ion-icon name="moon"></ion-icon> sombre
              </div>
              <div [class]="!modeSombre ? 'pill-active' : 'pill-inactive'" (click)="setMode(false)">
                <ion-icon name="sunny"></ion-icon> clair
              </div>
            </div>
          </div>

          <div class="setting-row">
            <p>Couleur :</p>
            <div class="color-grid">
              <div class="color-box orange" [class.selected]="couleurSelectionnee === 'orange'" (click)="setCouleur('orange')"></div>
              <div class="color-box green" [class.selected]="couleurSelectionnee === 'green'" (click)="setCouleur('green')"></div>
              <div class="color-box blue" [class.selected]="couleurSelectionnee === 'blue'" (click)="setCouleur('blue')"></div>
              <div class="color-box purple" [class.selected]="couleurSelectionnee === 'purple'" (click)="setCouleur('purple')"></div>
            </div>
          </div>
        </div>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-tabs>
